  <link rel="stylesheet" href="../../css/compra.css">
</head>
<body>
    <header>
        <div class="logo">☕ Cafeteira</div>
            <nav>
      <ul>
        <li><a href="../../page/home/home.html">Home</a></li>
        <li><a href="../../page/produtos/produtos.html">Produtos</a></li>

  <main>
  <h1 class="titulo">Finalizar Compra</h1>

  <div class="checkout-container">
    
    
    <div class="produto-info">
      <div class="produto-card" id="produto-selecionado">
        
      </div>
    </div>

    
    <div class="formulario">
     
      <div class="endereco">
        <h2>Endereço de Entrega</h2>
        <input type="text" id="rua" placeholder="Rua e número">
        <input type="text" id="bairro" placeholder="Bairro">
        <input type="text" id="cidade" placeholder="Cidade">
        <input type="text" id="cep" placeholder="CEP">
      </div>

     
      <div class="pagamento">
        <h2>Escolha a forma de pagamento</h2>
        <label><input type="radio" name="pagamento" value="Pix"> Pix</label>
        <label><input type="radio" name="pagamento" value="Débito"> Débito</label>
        <label><input type="radio" name="pagamento" value="Crédito"> Crédito</label>
      </div>

      <button id="finalizar">Finalizar Compra</button>
    </div>
    
  </div>
</main>
