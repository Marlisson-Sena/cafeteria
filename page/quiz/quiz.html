  <div class="quiz-container">
    <h1>Quiz sobre Café</h1>

    
    <div class="pergunta">
      <p>1. Qual país é considerado o maior produtor de café do mundo?</p>
      <label><input type="radio" name="q1" value="colombia"> Colômbia</label>
      <label><input type="radio" name="q1" value="brasil"> Brasil</label>
      <label><input type="radio" name="q1" value="etiopia"> Etiópia</label>
      <label><input type="radio" name="q1" value="vietna"> Vietnã</label>
    </div>

    
    <div class="pergunta">
      <p>2. Qual é o tipo de café mais consumido no Brasil?</p>
      <label><input type="radio" name="q2" value="arabica"> Arábica</label>
      <label><input type="radio" name="q2" value="robusta"> Robusta</label>
      <label><input type="radio" name="q2" value="conilon"> Conilon</label>
      <label><input type="radio" name="q2" value="expresso"> Expresso</label>
    </div>

    
    <div class="pergunta">
      <p>3. O que é um Cappuccino?</p>
      <label><input type="radio" name="q3" value="forte"> Café preto forte</label>
      <label><input type="radio" name="q3" value="mistura"> Mistura de café, leite vaporizado e espuma de leite</label>
      <label><input type="radio" name="q3" value="canela"> Café com canela</label>
      <label><input type="radio" name="q3" value="chocolate"> Café com chocolate</label>
    </div>

    
    <button id="finalizar">Finalizar Quiz</button>

    
    <div id="resultado"></div>
  </div>
